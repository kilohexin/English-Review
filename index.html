<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语听力复习</title>
    <style>
        :root {
            --primary: #6366F1;
            --primary-light: #818CF8;
            --primary-dark: #4F46E5;
            --primary-bg: #EEF2FF;
            --success: #10B981;
            --success-bg: #ECFDF5;
            --error: #EF4444;
            --error-bg: #FEF2F2;
            --warning: #F59E0B;
            --warning-bg: #FFFBEB;
            --bg: #F0F2F5;
            --card: #FFFFFF;
            --text: #1E293B;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.03);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 280px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .sidebar-header h1 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 0.8rem;
            opacity: 0.85;
        }

        .sidebar-actions {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .action-btn {
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn.primary { background: var(--primary); color: white; }
        .action-btn.primary:hover { background: var(--primary-dark); }
        .action-btn.secondary { background: var(--primary-bg); color: var(--primary); }
        .action-btn.secondary:hover { background: #DDD6FE; }
        .action-btn.warning { background: var(--warning-bg); color: #B45309; }
        .action-btn.warning:hover { background: #FDE68A; }
        .action-btn.success { background: var(--success-bg); color: #047857; }
        .action-btn.success:hover { background: #A7F3D0; }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }

        .nav-group { margin-bottom: 2px; }

        .nav-group-header {
            padding: 10px 20px;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: var(--transition);
            user-select: none;
        }

        .nav-group-header:hover { background: #F8FAFC; }

        .nav-group-header .arrow {
            transition: transform 0.2s;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .nav-group-header.collapsed .arrow { transform: rotate(-90deg); }

        .nav-group-items { overflow: hidden; }

        .nav-item {
            padding: 8px 20px 8px 36px;
            font-size: 0.82rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 3px solid transparent;
        }

        .nav-item:hover { background: #F8FAFC; color: var(--text); }
        .nav-item.active {
            background: var(--primary-bg);
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .nav-item .count {
            font-size: 0.7rem;
            background: #F1F5F9;
            padding: 2px 7px;
            border-radius: 10px;
            color: var(--text-secondary);
        }

        .nav-item.active .count { background: #C7D2FE; color: var(--primary-dark); }

        /* ===== Main Content ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            padding: 16px 32px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .topbar-left h2 {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .topbar-left p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mode-toggle {
            display: flex;
            background: #F1F5F9;
            border-radius: var(--radius-sm);
            padding: 3px;
        }

        .shuffle-toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            background: #F1F5F9;
            border-radius: var(--radius-sm);
            padding: 5px 10px;
            transition: var(--transition);
            user-select: none;
        }

        .shuffle-toggle input {
            accent-color: var(--primary);
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .shuffle-toggle:hover {
            background: #E2E8F0;
        }

        .mode-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            background: transparent;
            color: var(--text-secondary);
        }

        .mode-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: var(--shadow);
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .stat-item .stat-value {
            font-weight: 700;
            color: var(--text);
        }

        .stat-item .stat-value.success { color: var(--success); }
        .stat-item .stat-value.error { color: var(--error); }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

        /* ===== Welcome Page ===== */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .welcome h2 {
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        .welcome p {
            color: var(--text-secondary);
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .welcome-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            max-width: 700px;
            width: 100%;
        }

        .welcome-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px 20px;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .welcome-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .welcome-card .wc-icon { font-size: 2rem; margin-bottom: 10px; }
        .welcome-card h3 { font-size: 0.95rem; margin-bottom: 4px; }
        .welcome-card p { font-size: 0.78rem; color: var(--text-secondary); margin: 0; }

        /* ===== Question Cards ===== */
        .question-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            overflow: hidden;
            transition: var(--transition);
        }

        .question-card:hover { box-shadow: var(--shadow-md); }

        .q-header {
            padding: 16px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #F1F5F9;
        }

        .q-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: var(--primary-bg);
            color: var(--primary);
            border-radius: 50%;
            font-size: 0.8rem;
            font-weight: 700;
            margin-right: 10px;
        }

        .q-tag {
            font-size: 0.72rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: #F1F5F9;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .q-body { padding: 16px 20px; }

        .options-list { list-style: none; }

        .option-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .option-item:last-child { margin-bottom: 0; }
        .option-item:hover:not(.disabled) {
            background: #F8FAFC;
            border-color: #CBD5E1;
        }

        .option-letter {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #F1F5F9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .option-item:hover:not(.disabled) .option-letter {
            background: var(--primary-bg);
            color: var(--primary);
        }

        .option-item.disabled { pointer-events: none; }

        .option-item.correct {
            background: var(--success-bg);
            border-color: var(--success);
        }

        .option-item.correct .option-letter {
            background: var(--success);
            color: white;
        }

        .option-item.wrong {
            background: var(--error-bg);
            border-color: var(--error);
        }

        .option-item.wrong .option-letter {
            background: var(--error);
            color: white;
        }

        .option-item.selected-correct {
            background: var(--success-bg);
            border-color: var(--success);
        }

        .option-item.selected-correct .option-letter {
            background: var(--success);
            color: white;
        }

        /* Study mode - show correct answer highlight */
        .study-mode .option-item.correct-answer {
            background: var(--success-bg);
            border-color: var(--success);
        }

        .study-mode .option-item.correct-answer .option-letter {
            background: var(--success);
            color: white;
        }

        .feedback-area {
            margin: 0 20px 16px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            line-height: 1.5;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .feedback-area.show { display: block; }
        .feedback-correct { background: var(--success-bg); border-left: 4px solid var(--success); }
        .feedback-wrong { background: var(--error-bg); border-left: 4px solid var(--error); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Mock Exam ===== */
        .exam-header {
            background: linear-gradient(135deg, var(--primary), #7C3AED);
            color: white;
            padding: 24px 32px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .exam-header h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .exam-header p { font-size: 0.82rem; opacity: 0.9; }

        .exam-timer {
            font-size: 1.8rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .exam-progress {
            margin-bottom: 20px;
        }

        .progress-bar-bg {
            height: 8px;
            background: #E2E8F0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .exam-section-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-dark);
            padding: 12px 0 8px;
            border-bottom: 2px solid var(--primary-bg);
            margin-bottom: 16px;
            margin-top: 8px;
        }

        .exam-submit-area {
            text-align: center;
            padding: 32px 0;
        }

        .submit-btn {
            padding: 14px 48px;
            background: linear-gradient(135deg, var(--primary), #7C3AED);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(99,102,241,0.3);
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.4);
        }

        /* ===== Result Page ===== */
        .result-page {
            text-align: center;
            padding: 40px;
        }

        .result-score {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-weight: 700;
        }

        .result-score.excellent {
            background: linear-gradient(135deg, #10B981, #34D399);
            color: white;
        }

        .result-score.good {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }

        .result-score.poor {
            background: linear-gradient(135deg, var(--error), #F87171);
            color: white;
        }

        .result-score .score-num { font-size: 2.8rem; }
        .result-score .score-label { font-size: 0.85rem; opacity: 0.9; }

        .result-details {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 32px;
        }

        .result-detail-item {
            text-align: center;
        }

        .result-detail-item .rd-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .result-detail-item .rd-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* ===== Statistics Page ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stats-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .stats-card h4 {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stats-card .sc-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stats-card .sc-sub {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .unit-stats-table {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .unit-stats-table h3 {
            padding: 16px 20px;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border);
        }

        .ust-row {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #F8FAFC;
            font-size: 0.85rem;
        }

        .ust-row:last-child { border-bottom: none; }

        .ust-name { flex: 1; font-weight: 600; }

        .ust-bar {
            width: 120px;
            height: 6px;
            background: #E2E8F0;
            border-radius: 3px;
            margin: 0 16px;
            overflow: hidden;
        }

        .ust-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .ust-pct {
            width: 50px;
            text-align: right;
            font-weight: 700;
            font-size: 0.82rem;
        }

        /* ===== Mobile Hamburger ===== */
        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .hamburger-btn svg {
            width: 24px;
            height: 24px;
            stroke: var(--text);
            stroke-width: 2;
            fill: none;
        }

        /* ===== Sidebar Overlay ===== */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 998;
            animation: fadeIn 0.2s ease;
        }
        .sidebar-overlay.show { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .hamburger-btn { display: flex; align-items: center; }

            .sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                bottom: 0;
                z-index: 999;
                width: 280px;
                transition: left 0.3s ease;
                box-shadow: none;
            }
            .sidebar.open {
                left: 0;
                box-shadow: 4px 0 24px rgba(0,0,0,0.15);
            }

            .main {
                width: 100%;
            }

            .topbar {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }
            .topbar-left {
                flex: 1;
                min-width: 0;
            }
            .topbar-left h2 { font-size: 1rem; }
            .topbar-left p { font-size: 0.72rem; }

            .topbar-right {
                flex-wrap: wrap;
                gap: 8px;
                width: 100%;
                justify-content: flex-end;
            }

            .stats-bar { gap: 10px; }
            .stat-item { font-size: 0.75rem; }

            .content-area {
                padding: 16px 12px;
            }

            .welcome {
                padding: 24px 12px;
            }
            .welcome-icon { font-size: 2.8rem; margin-bottom: 12px; }
            .welcome h2 { font-size: 1.3rem; }
            .welcome p { font-size: 0.85rem; margin-bottom: 16px; }

            .welcome-cards {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .welcome-card { padding: 18px 16px; }

            .question-card { margin-bottom: 12px; }
            .q-header { padding: 12px 14px 10px; }
            .q-body { padding: 12px 14px; }
            .option-item {
                padding: 10px 12px;
                font-size: 0.85rem;
                gap: 8px;
            }
            .option-letter { width: 22px; height: 22px; font-size: 0.7rem; }
            .feedback-area { margin: 0 14px 12px; padding: 10px 12px; font-size: 0.82rem; }

            .exam-header {
                padding: 16px 18px;
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .exam-timer { font-size: 1.4rem; }

            .submit-btn { padding: 12px 32px; font-size: 0.9rem; }

            .result-page { padding: 24px 12px; }
            .result-score { width: 120px; height: 120px; }
            .result-score .score-num { font-size: 2.2rem; }
            .result-details { gap: 16px; flex-wrap: wrap; }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .stats-card { padding: 16px; }
            .stats-card .sc-value { font-size: 1.4rem; }

            .ust-row {
                padding: 10px 14px;
                font-size: 0.8rem;
            }
            .ust-bar { width: 60px; margin: 0 10px; }

            .chapter-actions {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 480px) {
            .topbar-right {
                gap: 6px;
            }
            .mode-btn { padding: 5px 10px; font-size: 0.75rem; }
            .shuffle-toggle { padding: 4px 8px; font-size: 0.75rem; }
            .stats-bar { gap: 6px; }

            .option-item { padding: 8px 10px; font-size: 0.82rem; }

            .exam-header { padding: 14px; }
            .exam-header h3 { font-size: 0.95rem; }
        }

        /* ===== Scrollbar for sidebar ===== */
        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }

        /* ===== Reset button ===== */
        .reset-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.78rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .reset-btn:hover { border-color: var(--error); color: var(--error); }

        /* ===== Exam option selected ===== */
        .option-item.exam-selected {
            background: var(--primary-bg);
            border-color: var(--primary);
        }

        .option-item.exam-selected .option-letter {
            background: var(--primary);
            color: white;
        }

        /* ===== Translation Styles ===== */
        .option-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .option-translation {
            font-size: 0.78rem;

"Section C": {p:"When the first spring flowers blossom, Easter comes. It is the oldest Christian feast. in honor of the （1） of Jesus Christ.\n\nAlong with the traditional Easter walk or （2）, the giving of Easter eggs and more recently, of Easter presents is a main （3） of the feast. Parents give their children \"Easter eggs\" -- colored and （4） eggs, chocolate eggs, marzipan eggs -- Easter bunnies, sweets and other gifts. In some German regions, children （5） \"collect\" Easter eggs from their relatives, especially from their （6）.\n\nUsually, the Easter eggs are carefully hidden in the garden or in the house and the children must search for them on the morning of Easter Sunday. They are told that the Easter bunny has brought them. This （7） bunny is like Santa Claus at Christmas. But it is less of an \"educational\" figure than Santa Claus is, since the eggs are not given to children as （8） for being good.\n\nThe origin of the \"Easter egg\" custom is not fully known. It probably had to do with taxes which the peasants had to pay their persons. Easter was one of the dates when they became （9） and many eggs were among the payments. The lords of the land, especially the church, gave some eggs to the poor as a kind of charity.\n\nThe customs relating to gifts have changed with the （10） passage of time. Easter eggs have become \"surprise gifts\". Presents are now exchanged between individuals who want to surprise their friends or relatives and make them happy.",b:[{w:"rebirth",t:"n. 重生；新生"},{w:"outing",t:"n. 短途出游，户外活动"},{w:"feature",t:"n. 特色，特点；v. 以……为特色"},{w:"boiled",t:"adj. 煮沸的，煮熟的；v. 煮沸"},{w:"virtually",t:"adv. 几乎；实际上"},{w:"godparents",t:"n. 教父；教母（复数）"},{w:"mysterious",t:"adj. 神秘的"},{w:"rewards",t:"n. 回报，奖励；v. 奖赏"},{w:"due",t:"adj. 预定的；应得的；到期的"},{w:"passage",t:"n. 通道；一段文字；旅途"}]},

"Section C": {p:"Have you been to Holland? Do you know what is special about this European country? Holland is also known as the Kingdom of the Netherlands, with a population of about 16 million. It's one of the big agricultural （1） in the world. The two important cities, Amsterdam and Rotterdam, are the world's largest ports. But the Dutch are living life in （2）.\n\nNearly a quarter of their country is below sea level. For centuries the Dutch have been waging a war with the water. They have tried their best to （3） their land. But as the land dries out, it's slowly sinking. What's more, the （4） makes things worse. Sea levels are rising. Today the Netherlands is faced with a frightening fact they are at risk of being （5） by water.\n\nThe Dutch people, however, （6）. They have built a series of huge barriers to hold back the ocean. Some ocean defenses they have built are almost the size of the Eiffel Tower. With these feats of （7）, Holland still exists today. For the Dutch, （8）. And the barricades are significant for survival.\n\nIn the last 50 years, the Dutch （9）. Looking ahead, they've set aside a further 25 billion dollars over the next 100 years. （10）.",b:[{w:"exporters",t:"n. 出口商；出口企业"},{w:"worry",t:"v./n. 担忧，发愁"},{w:"hold on to",t:"坚持；守住；保住"},{w:"change of climate",t:"气候变化"},{w:"wiped out",t:"彻底摧毁；消灭"},{w:"have responded",t:"已作出回应"},{w:"fantastic engineering",t:"精妙宏伟的水利工程"},{w:"the constant fear of flooding is a way of life",t:"常年担忧洪水泛滥已是当地人的常态"},{w:"have spent an unbelievably large sum of money on flood protection",t:"已经投入一笔数额惊人的巨款用于防洪工程"},{w:"As they say, every effort is made to keep their feet dry",t:"正如当地人所说，人们想尽一切办法避免遭受洪水侵袭"}]},

"Section C": {p:"Swimming isn't something for everyone. Those who are overweight, pregnant or suffer from back pain may enjoy swimming since in water they weigh about one tenth of their weight on land. The water increases range of （1） for those with arthritis because there is less （2） to lift when raising an arm or leg. Additionally, the （3） surrounds most pools. It makes breathing easier for people with serious lung conditions.\n\nWith all its benefits, swimming has one major （4）: it requires one of the biggest pieces of equipment needed for any exercise -- a pool Finding a club or a community pool that is （5） both in terms of location and swim times can be a challenge.\n\nAdditionally, even though swimming is kind to your （6）, it doesn't place any stress on your bones. Weight-bearing exercise is （7） for maintaining bone mass and building strong bones, so you should supplement your swim with some other activities, such as walking, running or lifting weight.\n\nAssuming that you are an average swimmer, （8）. Try swimming a lap and resting for 30 seconds, or if that's too easy, swim for five minutes and rest for one, working up to a total of thirty minutes of active swimming. If your total time swimming is 20 to 30 minutes, （9） and more than if you walked for 20 to 30 minutes.\n\nMost importantly, don't judge your progress by the others around you. （10）, how many laps you can complete in a given time or simply by how good you feel after a few weeks.\n\nSoon enough you'll be healthier.",b:[{w:"motion",t:"n. 运动，动作"},{w:"weight",t:"n. 重量；体重"},{w:"humidity",t:"n. 湿度"},{w:"drawback",t:"n. 缺点，弊端"},{w:"convenient",t:"adj. 方便的，便利的"},{w:"joints",t:"n. 关节；连接处"},{w:"essential",t:"adj. 至关重要的，必不可少的"},{w:"three days a week is recommended for overall physical improvement",t:"建议每周锻炼三天，全面提升身体素质"},{w:"you'll get as much benefit as if you ran for 20 to 30 minutes",t:"你获得的锻炼效果等同于慢跑 20 至 30 分钟"},{w:"Track your personal progress by how long you can swim without stopping",t:"通过不间断游泳的时长，记录自己 "Section C": {p:"Sign Language is a communication system using gestures that are interpreted visually. Many people in deaf （1） around the world use sign languages as their primary means of communication. For babies that haven't yet learned to speak, sign language also （2） their primary language.\n\nBabies learn to clap their hands when they are happy and （3） their arms to be picked up. Most babies also learn to shake their （4） for no and nod for yes. The fact is, parents and babies have always used a limited form of sign language to communicate.\n\nResearch has shown that while babies may lack the fine motor （5） to speak, they do have the ability to understand and use language as early as 6-7 months. And given the right （6）, they have lots to say -- with their hands. When we teach a hearing baby basic signs, there is an immediate （7） in parent-baby communication that has never been possible before.\n\nResearchers tell us that the early years are prime time for acquiring language skills. It has been proven that （8）. In fact, hearing children who learn sign language have been shown to （9）.\n\nMost importantly, baby sign language （10） who cannot yet communicate with speech. Even older children love the \"secret\" communication that they can have with their parents in even the quietest of places.",b:[{w:"communities",t:"n. 社区；群体"},{w:"serves as",t:"充当；担任"},{w:"stretch out",t:"伸展；延伸"},{w:"heads",t:"n. 负责人；头部；v. 带领"},{w:"skills",t:"n. 技能，技巧"},{w:"guidance",t:"n. 指导，引导"},{w:"boost",t:"v./n. 促进；提升"},{w:"baby sign language does not delay speech",t:"婴儿手语并不会延缓语言发育"},{w:"score 12 points higher on IQ tests in later years",t:"日后智商测试得分高出 12 分"},{w:"increases trust between parent and child and decreases frustration for young children",t:"增进亲子间的信任，同时减少幼儿的烦躁情绪"}]},

let allQuestions = [];
let qIndex = 0;

// Strip "A. " / "B. " / "C. " / "D. " prefix from option text
function stripOptPrefix(s) { return s.replace(/^[A-D]\.\s*/, ''); }

Object.keys(BANK).forEach(unit => {
    Object.keys(BANK[unit]).forEach(section => {
        const data = BANK[unit][section];
        if (!Array.isArray(data)) return; // skip Section C (object, not array)
        data.forEach((q, i) => {
            allQuestions.push({
                id: qIndex++,
                unit,
                section,
                num: i + 1,
                answer: q.a,
                options: q.o,
                translations: q.t || []
            });
        });
    });
});

// Persistent stats
let stats = loadStats();

function loadStats() {
    try {
        const s = JSON.parse(localStorage.getItem('en_study_stats'));
        if (s) return s;
    } catch(e) {}
    return { answered: {}, history: [] };
}

function saveStats() {
    localStorage.setItem('en_study_stats', JSON.stringify(stats));
}

function recordAnswer(qId, isCorrect, selectedIdx) {
    stats.answered[qId] = { correct: isCorrect, selectedIdx: selectedIdx, time: Date.now() };
}

function getStatsSummary() {
    const keys = Object.keys(stats.answered);
    const total = keys.length;
    const correct = keys.filter(k => stats.answered[k].correct).length;
    return { total, correct, rate: total > 0 ? Math.round(correct / total * 100) : 0 };
}

function getUnitStats(unit) {
    const qs = allQuestions.filter(q => q.unit === unit);
    const answered = qs.filter(q => stats.answered[q.id] !== undefined);
    const correct = answered.filter(q => stats.answered[q.id].correct);
    return { total: qs.length, answered: answered.length, correct: correct.length, rate: answered.length > 0 ? Math.round(correct.length / answered.length * 100) : 0 };
}

function getSectionType(section) {
    if (section.startsWith('Section A')) return 'A';
    if (section.startsWith('Section B')) return 'B';
    if (section.startsWith('Section C')) return 'C';
    return 'F';
}

function setActiveNav(el) {

    if (el) el.classList.add('active');

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        let j;
        if (typeof crypto !== 'undefined' && crypto.getRandomValues) {
            // Rejection sampling to eliminate modulo bias
            const limit = Math.floor(0xFFFFFFFF / (i + 1)) * (i + 1);
            const buf = new Uint32Array(1);
            do { crypto.getRandomValues(buf); } while (buf[0] >= limit);
            j = buf[0] % (i + 1);
        } else {
            j = Math.floor(Math.random() * (i + 1));
        }
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

// Generate shuffled option order for a question (e.g. [2,0,3,1])
function makeShuffleOrder(n) {
    return shuffle([...Array(n).keys()]);
}

// Build optionShuffleMap for a set of questions
function buildShuffleMap(questions) {
    const map = {};
    questions.forEach(q => { map[q.id] = makeShuffleOrder(q.options.length); });
    return map;
}

// Given a shuffled display index, find the original option index
function displayToOriginal(qId, displayIdx) {
    const order = optionShuffleMap[qId];
    return order ? order[displayIdx] : displayIdx;
}

// Given an original option index, find the shuffled display index
function originalToDisplay(qId, origIdx) {
    const order = optionShuffleMap[qId];
    if (!order) return origIdx;
    return order.indexOf(origIdx);
}

// ==================== SIDEBAR ====================
function initSidebar() {
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = '';

    Object.keys(BANK).forEach(unit => {
        const group = document.createElement('div');
        group.className = 'nav-group';

        const header = document.createElement('div');
        header.className = 'nav-group-header';
        const totalQ = Object.values(BANK[unit]).reduce((s, v) => s + (Array.isArray(v) ? v.length : 0), 0);
        header.innerHTML = `<span>${unit}</span><span class="arrow">▼</span>`;

        const items = document.createElement('div');
        items.className = 'nav-group-items';

        // Unit overview
        const overviewItem = document.createElement('div');
        overviewItem.className = 'nav-item';
        overviewItem.innerHTML = `<span>全部题目</span><span class="count">${totalQ}</span>`;
        overviewItem.onclick = () => { setActiveNav(overviewItem); loadChapter(unit, null); };
        items.appendChild(overviewItem);

        Object.keys(BANK[unit]).forEach(section => {
            const item = document.createElement('div');
            item.className = 'nav-item';
            const isSectionC = section.startsWith('Section C');
            const count = isSectionC ? '填空' : BANK[unit][section].length;
            item.innerHTML = `<span>${section}</span><span class="count">${count}</span>`;
            item.onclick = () => { setActiveNav(item); loadChapter(unit, section); };
            items.appendChild(item);
        });

        header.onclick = () => {
            header.classList.toggle('collapsed');
            items.style.display = header.classList.contains('collapsed') ? 'none' : 'block';
        };

        group.appendChild(header);
        group.appendChild(items);
        nav.appendChild(group);
    });
}

    // Random quiz and exam only support quiz mode
    if ((currentView === 'random' || currentView === 'exam') && mode === 'study') return;
    currentMode = mode;
    document.getElementById('mode-quiz').classList.toggle('active', mode === 'quiz');
    document.getElementById('mode-study').classList.toggle('active', mode === 'study');
    // Re-render current view
    if (currentView === 'chapter' && currentChapter) {
        loadChapter(currentChapter.unit, currentChapter.section);
    }
}

function updateModeToggleState() {
    const studyBtn = document.getElementById('mode-study');
    if (currentView === 'random' || currentView === 'exam') {
        studyBtn.style.opacity = '0.4';
        studyBtn.style.pointerEvents = 'none';
        if (currentMode === 'study') {
            currentMode = 'quiz';
            document.getElementById('mode-quiz').classList.add('active');
            studyBtn.classList.remove('active');
        }
    } else {
        studyBtn.style.opacity = '';
        studyBtn.style.pointerEvents = '';
    }
}

}

// ==================== LOAD CHAPTER ====================

function clearUnitProgress(unit, section) {
    const scope = section || `整个 ${unit}`;
    if (!confirm(`确定要清空 ${scope} 的答题记录吗？此操作不可撤销。`)) return;

// ==================== SECTION C LISTENING ====================
let listenAbort = false;

function getSectionCData() {
    if (currentView === 'chapter' && currentChapter) {
        if (currentChapter.section && currentChapter.section.startsWith('Section C')) {
            return BANK[currentChapter.unit][currentChapter.section];
        }
        const secCKey = Object.keys(BANK[currentChapter.unit]).find(k => k.startsWith('Section C'));
        return secCKey ? BANK[currentChapter.unit][secCKey] : null;
    }
    return null;
}

function getSectionCDataByUnit(unit) {
    const secCKey = Object.keys(BANK[unit]).find(k => k.startsWith('Section C'));
    return secCKey ? BANK[unit][secCKey] : null;
}

function speak(text, rate) {
    return new Promise(resolve => {
        if (!('speechSynthesis' in window) || listenAbort) { resolve(); return; }
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = rate || 0.9;
        u.onend = () => { if (listenAbort) speechSynthesis.cancel(); resolve(); };
        u.onerror = resolve;
        speechSynthesis.speak(u);
    });
}

function abortableDelay(ms) {
    return new Promise(resolve => {
        const check = () => {
            if (listenAbort) { resolve(); return; }
            if (ms <= 0) { resolve(); return; }
            const step = Math.min(ms, 200);
            ms -= step;
            setTimeout(check, step);
        };
        check();
    });
}

function updateListenUI(playing) {
    const stopBtn = document.getElementById('listen-stop-btn');
    const status = document.getElementById('listen-status');
    if (stopBtn) stopBtn.style.display = playing ? '' : 'none';
    if (status && !playing) status.textContent = '';
}

async function startWordListening() {
    stopListening(); // Stop any ongoing listening first
    await new Promise(r => setTimeout(r, 100)); // Wait for cancellation
    const data = getSectionCData();
    if (!data || !data.b || data.b.length === 0) return;
    listenAbort = false;
    updateListenUI(true);
    const interval = parseFloat(document.getElementById('listen-interval')?.value) || 3;
    const rate = parseFloat(document.getElementById('listen-rate')?.value) || 0.9;
    const status = document.getElementById('listen-status');
    for (let i = 0; i < data.b.length; i++) {
        if (listenAbort) break;
        if (status) status.textContent = `${i + 1}/${data.b.length} ${data.b[i].w}`;
        await speak(data.b[i].w, rate);
        if (listenAbort) break;
        if (i < data.b.length - 1) {
            await abortableDelay(interval * 1000);
        }
    }
    updateListenUI(false);
}

async function startWordListeningUnit(unit) {
    stopListening();
    await new Promise(r => setTimeout(r, 100));
    const data = getSectionCDataByUnit(unit);
    if (!data || !data.b || data.b.length === 0) return;

}

// ==================== RANDOM QUIZ ====================
function startRandomQuiz() {
    closeSidebar();
    clearExamState();
    currentView = 'random';
    currentChapter = null;
    setActiveNav(null);
    updateModeToggleState();
    setTopbar('随机练习', '随机抽取 20 道题目');

    // Prefer questions not used last time
    const freshPool = allQuestions.filter(q => !lastUsedIds.has(q.id));
    const pool = freshPool.length >= 20 ? freshPool : allQuestions;
    const selected = shuffle(pool).slice(0, 20);
    lastUsedIds = new Set(selected.map(q => q.id));
    optionShuffleMap = buildShuffleMap(selected);
    renderQuiz(selected);
}

// ==================== RENDER QUIZ ====================
function renderQuiz(questions) {
    const content = document.getElementById('content-area');
    const isStudy = currentMode === 'study';
    const shouldShuffle = (currentView === 'random' || currentView === 'exam') && shuffleOptions;

    let html = `<div class="${isStudy ? 'study-mode' : ''}">`;
    const ignoreHistory = (currentView === 'random' || currentView === 'exam');
    questions.forEach((q, idx) => {
        const answered = ignoreHistory ? undefined : stats.answered[q.id];
        const letters = ['A', 'B', 'C', 'D'];
        const order = shouldShuffle && optionShuffleMap[q.id] ? optionShuffleMap[q.id] : [...Array(q.options.length).keys()];

        html += `<div class="question-card" id="qcard-${q.id}">`;
        html += `<div class="q-header">
            <span style="display:flex;align-items:center;">
                <span class="q-number">${idx + 1}</span>
                <strong>Question ${idx + 1}</strong>
            </span>
            <span class="q-tag">${q.unit} · ${q.section}</span>
        </div>`;
        html += `<div class="q-body"><ul class="options-list" id="opts-${q.id}">`;

        order.forEach((origIdx, dispIdx) => {
            let cls = 'option-item';
            if (isStudy && origIdx === q.answer) cls += ' correct-answer';
            if (answered !== undefined && !isStudy) {
                cls += ' disabled';
                if (origIdx === q.answer) cls += ' correct';
                if (origIdx !== q.answer && answered && !answered.correct && stats.answered[q.id] && stats.answered[q.id].selectedIdx === origIdx) cls += ' wrong';
            }

            // Only show translation after answering or in study mode
            const showTrans = (answered !== undefined) || isStudy;
            const trans = (showTrans && q.translations && q.translations[origIdx]) ? `<span class="option-translation">${q.translations[origIdx]}</span>` : '';
            html += `<li class="${cls}" data-qid="${q.id}" data-oi="${origIdx}" onclick="handleOptionClick(${q.id}, ${origIdx})">
                <span class="option-letter">${letters[dispIdx]}</span>
                <span class="option-content">${stripOptPrefix(q.options[origIdx])}${trans}</span>
            </li>`;
        });

        html += `</ul></div>`;

        // Build translation list for feedback (follow shuffled order)
        let transList = '';
        if (q.translations && q.translations.length > 0) {
            transList = order.map((origIdx, dispIdx) => {
                return `<div class="trans-line"><span class="trans-letter ${origIdx === q.answer ? 'trans-correct' : ''}">${letters[dispIdx]}</span> ${stripOptPrefix(q.options[origIdx])} <span class="trans-zh">${q.translations[origIdx] || ''}</span></div>`;
            }).join('');
        }

        // The display letter of the correct answer (follows shuffled order)
        const correctDispIdx = order.indexOf(q.answer);
        const correctLetter = letters[correctDispIdx];

        // Feedback area
        if (answered !== undefined && !isStudy) {
            const isCorrect = answered.correct;
            html += `<div class="feedback-area show ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}">
                <strong>${isCorrect ? '✅ 回答正确！' : '❌ 回答错误！'}</strong>
                ${!isCorrect ? `<span> 正确答案：${correctLetter}</span>` : ''}
                ${transList ? `<div class="trans-list">${transList}</div>` : ''}
            </div>`;
        } else if (isStudy) {
            html += `<div class="feedback-area show feedback-correct">
                <strong>📖 学习模式</strong> · 正确答案：${correctLetter}
                ${transList ? `<div class="trans-list">${transList}</div>` : ''}
            </div>`;
        } else {
            html += `<div class="feedback-area" id="fb-${q.id}"></div>`;
        }

        html += `</div>`;
    });
    html += `</div>`;

    content.innerHTML = html;
    content.scrollTop = 0;
}

// ==================== OPTION CLICK ====================
function handleOptionClick(qId, optIdx) {
    if (currentMode === 'study') return;
    if (currentView === 'exam') {
        handleExamOptionClick(qId, optIdx);
        return;
    }

    const q = allQuestions.find(x => x.id === qId);
    if (!q) return;
    // In study mode, don't record answers
    if (currentMode === 'study') return;
    // In random mode, allow re-answering even if previously answered in chapter mode
    const ignoreHistory = currentView === 'random';
    if (!ignoreHistory && stats.answered[qId] !== undefined) return;

    const isCorrect = optIdx === q.answer;
    // In random mode, don't overwrite existing chapter progress
    if (ignoreHistory && stats.answered[qId] !== undefined) {
        // Already answered in chapter mode, skip persisting but still show visual feedback
    } else {
        stats.answered[qId] = { correct: isCorrect, selectedIdx: optIdx, time: Date.now() };
    }

    const letters = ['A', 'B', 'C', 'D'];
    const opts = document.querySelectorAll(`[data-qid="${qId}"]`);
    opts.forEach(el => {
        el.classList.add('disabled');
        const oi = parseInt(el.dataset.oi);
        if (oi === q.answer) el.classList.add('correct');
        if (oi === optIdx && !isCorrect) el.classList.add('wrong');
        // Add translation to option after answering
        if (q.translations && q.translations[oi]) {
            const contentEl = el.querySelector('.option-content');
            if (contentEl && !contentEl.querySelector('.option-translation')) {
                contentEl.insertAdjacentHTML('beforeend', `<span class="option-translation">${q.translations[oi]}</span>`);
            }
        }
    });

    const fb = document.getElementById(`fb-${qId}`);
    if (fb) {
        const order = optionShuffleMap[qId] || [...Array(q.options.length).keys()];
        let transList = '';
        if (q.translations && q.translations.length > 0) {
            transList = order.map((origIdx, dispIdx) => {
                return `<div class="trans-line"><span class="trans-letter ${origIdx === q.answer ? 'trans-correct' : ''}">${letters[dispIdx]}</span> ${stripOptPrefix(q.options[origIdx])} <span class="trans-zh">${q.translations[origIdx] || ''}</span></div>`;
            }).join('');
        }
        const correctDispIdx = order.indexOf(q.answer);
        const correctLetter = letters[correctDispIdx];
        fb.className = `feedback-area show ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}`;
        fb.innerHTML = `<strong>${isCorrect ? '✅ 回答正确！' : '❌ 回答错误！'}</strong>
            ${!isCorrect ? `<span> 正确答案：${correctLetter}</span>` : ''}
            ${transList ? `<div class="trans-list">${transList}</div>` : ''}`;
    }

    // Defer non-critical updates to avoid blocking UI
    requestAnimationFrame(() => {
        saveStats();
        updateStatsBar();
        updateChapterActions();
    });
}
function startMockExam() {
    closeSidebar();
    clearExamState();
    currentView = 'exam';
    currentChapter = null;
    setActiveNav(null);

    const units = Object.keys(BANK);

    // Pick a random unit independently for each section type (can repeat)
    const pick = () => units[Math.floor(Math.random() * units.length)];
    const unitForA = pick();
    const unitForB = pick();
    const unitForC = pick();
    const unitForF = pick();

    // Gather questions
    const secAQuestions = allQuestions.filter(q => q.unit === unitForA && getSectionType(q.section) === 'A');
    const secBQuestions = allQuestions.filter(q => q.unit === unitForB && getSectionType(q.section) === 'B');
    const secFQuestions = allQuestions.filter(q => q.unit === unitForF && getSectionType(q.section) === 'F');
    const secCKey = Object.keys(BANK[unitForC]).find(k => k.startsWith('Section C'));
    const secCData = secCKey ? BANK[unitForC][secCKey] : null;

    const examQuestions = [...secAQuestions, ...secBQuestions, ...secFQuestions];

    lastUsedIds = new Set(examQuestions.map(q => q.id));

    examState = {
        questions: examQuestions,
        sectionCUnit: unitForC,
        sectionCData: secCData,
        answers: {},
        startTime: Date.now(),
        duration: 30 * 60, // 30 minutes
        submitted: false
    };
    optionShuffleMap = buildShuffleMap(examQuestions);

    const totalChoice = examQuestions.length;
    setTopbar('模拟试卷', `选择题 ${totalChoice} 题 + Section C 填空 · 限时 30 分钟`);
    updateModeToggleState();
    renderExam();
    startExamTimer();
}

function startExamTimer() {
    if (examTimer) clearInterval(examTimer);
    examTimer = setInterval(() => {
        if (!examState || examState.submitted) {
            clearInterval(examTimer);
            return;
        }
        const elapsed = Math.floor((Date.now() - examState.startTime) / 1000);
        const remaining = Math.max(0, examState.duration - elapsed);
        const timerEl = document.getElementById('exam-timer');
        if (timerEl) {
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (remaining <= 60) timerEl.style.color = '#FCA5A5';
            else if (remaining <= 300) timerEl.style.color = '#FDE68A';
        }
        if (remaining <= 0) {
            submitExam();
        }
    }, 1000);
}

function renderExam() {
    const eq = examState.questions;
    const letters = ['A', 'B', 'C', 'D'];
    const content = document.getElementById('content-area');

    const secA = eq.filter(q => getSectionType(q.section) === 'A');
    const secB = eq.filter(q => getSectionType(q.section) === 'B');
    const secF = eq.filter(q => getSectionType(q.section) === 'F');
    const secCUnit = examState.sectionCUnit;
    const secCData = examState.sectionCData;

    let html = `
        <div class="exam-header">
            <div>
                <h3>模拟试卷</h3>
                <p>Section A (${secAUnit()}) · Section B (${secBUnit()}) · Section C (${secCUnit}) · Follow Up (${secFUnit()})</p>
            </div>
            <div class="exam-timer" id="exam-timer">30:00</div>
        </div>
        <div class="exam-progress">
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="exam-progress-bar" style="width:0%"></div></div>
            <div class="progress-text">
                <span id="exam-progress-text">已答 0 / ${eq.length}</span>
                <span>限时 30 分钟</span>
            </div>
        </div>
    `;

    // Part I: Section A
    html += `<div class="exam-section-title">Part I · Section A — 短对话 (${secAUnit()}) (${secA.length} 题)</div>`;
    secA.forEach((q, i) => { html += renderExamQuestion(q, i + 1, letters); });

    // Part II: Section B
    html += `<div class="exam-section-title">Part II · Section B — 篇章听力 (${secBUnit()}) (${secB.length} 题)</div>`;
    secB.forEach((q, i) => { html += renderExamQuestion(q, secA.length + i + 1, letters); });

    // Part III: Section C — Fill in the blanks
    if (secCData && secCData.p) {
        html += `<div class="exam-section-title">Part III · Section C — 填空 (${secCUnit})</div>`;
        html += `<div class="section-c-card" style="margin-bottom:16px;">
            <div class="sc-toolbar">
                <button class="action-btn secondary" style="font-size:0.78rem;padding:4px 12px;" onclick="examRevealAll()">显示全部答案</button>
                <button class="action-btn warning" style="font-size:0.78rem;padding:4px 12px;" onclick="examHideAll()">隐藏全部答案</button>
            </div>
            <div class="sc-listen-bar">
                <button class="action-btn primary" style="font-size:0.78rem;padding:4px 12px;" onclick="startWordListeningExam()">单词听力练习</button>
                <button class="action-btn primary" style="font-size:0.78rem;padding:4px 12px;" onclick="startFullPassageExam()">阅读全篇测试</button>
                <button class="action-btn" style="font-size:0.78rem;padding:4px 12px;display:none;background:#ef4444;color:#fff;border:none;" id="listen-stop-btn" onclick="stopListening()">⏹ 停止</button>
                <label>间隔 <input type="number" id="listen-interval" value="3" min="1" max="10"> 秒</label>
                <label>语速 <input type="number" id="listen-rate" value="0.9" min="0.5" max="2" step="0.1"></label>
                <span class="listen-status" id="listen-status"></span>
            </div>
            <div class="sc-passage">`;
        const blanks = secCData.b || [];
        const parts = secCData.p.split(/（(\d+)）/);
        parts.forEach((part, i) => {
            if (i % 2 === 0) {
                html += part.replace(/\n/g, '<br>');
            } else {
                const idx = parseInt(part) - 1;
                const blank = blanks[idx];
                if (blank) {
                    html += `<span class="sc-blank" id="exam-blank-${idx}" onclick="examToggleBlank(${idx})" data-word="${blank.w}" data-trans="${blank.t}" title="点击查看答案">(${part})</span>`;
                }
            }
        });
        html += `</div></div>`;
    }

    // Part IV: Follow Up
    html += `<div class="exam-section-title">Part IV · Follow Up — 综合理解 (${secFUnit()}) (${secF.length} 题)</div>`;
    secF.forEach((q, i) => { html += renderExamQuestion(q, secA.length + secB.length + i + 1, letters); });

    html += `
        <div class="exam-submit-area">
            <button class="submit-btn" onclick="submitExam()">交 卷</button>
        </div>
    `;

    content.innerHTML = html;
    content.scrollTop = 0;
}

function secAUnit() { return examState.questions.find(q => getSectionType(q.section) === 'A')?.unit || ''; }
function secBUnit() { return examState.questions.find(q => getSectionType(q.section) === 'B')?.unit || ''; }
function secFUnit() { return examState.questions.find(q => getSectionType(q.section) === 'F')?.unit || ''; }

function examToggleBlank(idx) {
    const el = document.getElementById(`exam-blank-${idx}`);
    if (!el) return;
    if (el.classList.contains('revealed')) {
        el.classList.remove('revealed');
        el.textContent = `(${idx + 1})`;
    } else {
        el.classList.add('revealed');
        el.innerHTML = `<strong>${el.dataset.word}</strong> <span class="sc-blank-trans">${el.dataset.trans}</span>`;
    }
}

function examRevealAll() {
    const blanks = examState.sectionCData.b || [];
    blanks.forEach((b, i) => {
        const el = document.getElementById(`exam-blank-${i}`);
        if (el && !el.classList.contains('revealed')) {
            el.classList.add('revealed');
            el.innerHTML = `<strong>${el.dataset.word}</strong> <span class="sc-blank-trans">${el.dataset.trans}</span>`;
        }
    });
}

function examHideAll() {
    const blanks = examState.sectionCData.b || [];
    blanks.forEach((b, i) => {
        const el = document.getElementById(`exam-blank-${i}`);
        if (el && el.classList.contains('revealed')) {
            el.classList.remove('revealed');
            el.textContent = `(${i + 1})`;
        }
    });
}

async function startWordListeningExam() {
    stopListening();
    await new Promise(r => setTimeout(r, 100));
    if (!examState || !examState.sectionCData || !examState.sectionCData.b) return;
    const data = examState.sectionCData;
    listenAbort = false;
    updateListenUI(true);
    const interval = parseFloat(document.getElementById('listen-interval')?.value) || 3;
    const rate = parseFloat(document.getElementById('listen-rate')?.value) || 0.9;
    const status = document.getElementById('listen-status');
    for (let i = 0; i < data.b.length; i++) {
        if (listenAbort) break;
        if (status) status.textContent = `${i + 1}/${data.b.length} ${data.b[i].w}`;
        await speak(data.b[i].w, rate);
        if (listenAbort) break;
        if (i < data.b.length - 1) {
            await new Promise(r => setTimeout(r, interval * 1000));
        }
    }
    updateListenUI(false);
}

async function startFullPassageExam() {
    stopListening();
    await new Promise(r => setTimeout(r, 100));
    if (!examState || !examState.sectionCData || !examState.sectionCData.p) return;
    const data = examState.sectionCData;
    listenAbort = false;
    updateListenUI(true);
    const rate = parseFloat(document.getElementById('listen-rate')?.value) || 0.9;
    const status = document.getElementById('listen-status');
    if (status) status.textContent = '朗读中...';
    const blanks = data.b || [];
    const cleanText = data.p.replace(/（(\d+)）/g, (_, num) => {
        const idx = parseInt(num) - 1;
        return blanks[idx] ? blanks[idx].w : '';
    });
    await speak(cleanText, rate);
    updateListenUI(false);
}

function renderExamQuestion(q, num, letters) {
    const order = shuffleOptions && optionShuffleMap[q.id] ? optionShuffleMap[q.id] : [...Array(q.options.length).keys()];
    let html = `<div class="question-card" id="qcard-${q.id}">
        <div class="q-header">
            <span style="display:flex;align-items:center;">
                <span class="q-number">${num}</span>
                <strong>Question ${num}</strong>
            </span>
            <span class="q-tag">${q.unit} · ${q.section}</span>
        </div>
        <div class="q-body"><ul class="options-list" id="opts-${q.id}">`;

    order.forEach((origIdx, dispIdx) => {
        const selected = examState.answers[q.id] === origIdx;
        html += `<li class="option-item ${selected ? 'exam-selected' : ''}" data-qid="${q.id}" data-oi="${origIdx}" onclick="handleExamOptionClick(${q.id}, ${origIdx})">
            <span class="option-letter">${letters[dispIdx]}</span>
            <span>${stripOptPrefix(q.options[origIdx])}</span>
        </li>`;
    });

    html += `</ul></div></div>`;
    return html;
}

function handleExamOptionClick(qId, optIdx) {
    if (!examState || examState.submitted) return;
    examState.answers[qId] = optIdx;

    // Update UI
    const opts = document.querySelectorAll(`[data-qid="${qId}"]`);
    opts.forEach(el => {
        const oi = parseInt(el.dataset.oi);
        el.classList.toggle('exam-selected', oi === optIdx);
    });

    // Update progress
    const answered = Object.keys(examState.answers).length;
    const total = examState.questions.length;
    const bar = document.getElementById('exam-progress-bar');
    const text = document.getElementById('exam-progress-text');
    if (bar) bar.style.width = (answered / total * 100) + '%';
    if (text) text.textContent = `已答 ${answered} / ${total}`;
}

function submitExam() {
    if (!examState || examState.submitted) return;
    examState.submitted = true;
    if (examTimer) clearInterval(examTimer);

    const letters = ['A', 'B', 'C', 'D'];
    let correct = 0;
    const total = examState.questions.length;

    examState.questions.forEach(q => {
        const selected = examState.answers[q.id];
        const isCorrect = selected === q.answer;

        if (selected !== undefined && stats.answered[q.id] === undefined) {
            recordAnswer(q.id, isCorrect, selected);
        }

        // Update card visual
        const opts = document.querySelectorAll(`[data-qid="${q.id}"]`);
        opts.forEach(el => {
            el.classList.add('disabled');
            el.classList.remove('exam-selected');
            const oi = parseInt(el.dataset.oi);
            if (oi === q.answer) el.classList.add('correct');
            if (oi === selected && !isCorrect) el.classList.add('wrong');
        });

        if (isCorrect) correct++;

        // Add feedback
        const card = document.getElementById(`qcard-${q.id}`);
        if (card) {
            const order = optionShuffleMap[q.id] || [...Array(q.options.length).keys()];
            let transList = '';
            if (q.translations && q.translations.length > 0) {
                transList = order.map((origIdx, dispIdx) => {
                    return `<div class="trans-line"><span class="trans-letter ${origIdx === q.answer ? 'trans-correct' : ''}">${letters[dispIdx]}</span> ${stripOptPrefix(q.options[origIdx])} <span class="trans-zh">${q.translations[origIdx] || ''}</span></div>`;
                }).join('');
            }
            const correctDispIdx = order.indexOf(q.answer);
            const correctLetter = letters[correctDispIdx];
            const fb = document.createElement('div');
            fb.className = `feedback-area show ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}`;
            if (selected === undefined) {
                fb.className = 'feedback-area show feedback-wrong';
                fb.innerHTML = `<strong>⚠️ 未作答</strong> · 正确答案：${correctLetter}${transList ? `<div class="trans-list">${transList}</div>` : ''}`;
            } else {
                fb.innerHTML = `<strong>${isCorrect ? '✅ 正确' : '❌ 错误'}</strong>${!isCorrect ? ` · 正确答案：${correctLetter}` : ''}${transList ? `<div class="trans-list">${transList}</div>` : ''}`;
            }
            card.appendChild(fb);
        }
    });

    // Batch save all answers at once
    saveStats();
    updateStatsBar();

    // Show result
    const rate = Math.round(correct / total * 100);
    const elapsed = Math.floor((Date.now() - examState.startTime) / 1000);
    const timeStr = `${Math.floor(elapsed / 60)}分${elapsed % 60}秒`;

    let scoreClass = 'poor';
    if (rate >= 80) scoreClass = 'excellent';
    else if (rate >= 60) scoreClass = 'good';

    const resultHtml = `
        <div class="result-page">
            <div class="result-score ${scoreClass}">
                <div class="score-num">${correct}/${total}</div>
                <div class="score-label">正确率 ${rate}%</div>
            </div>
            <h2 style="margin-bottom:8px;">${rate >= 80 ? '🎉 表现优秀！' : rate >= 60 ? '👍 继续加油！' : '💪 需要更多练习'}</h2>
            <p style="color:var(--text-secondary);margin-bottom:24px;">用时 ${timeStr}</p>
            <div class="result-details">
                <div class="result-detail-item">
                    <div class="rd-value" style="color:var(--success)">${correct}</div>
                    <div class="rd-label">正确</div>
                </div>
                <div class="result-detail-item">
                    <div class="rd-value" style="color:var(--error)">${total - correct - (total - Object.keys(examState.answers).length)}</div>
                    <div class="rd-label">错误</div>
                </div>
                <div class="result-detail-item">
                    <div class="rd-value" style="color:var(--text-secondary)">${total - Object.keys(examState.answers).length}</div>
                    <div class="rd-label">未答</div>
                </div>
                <div class="result-detail-item">
                    <div class="rd-value" style="color:var(--primary)">${timeStr}</div>
                    <div class="rd-label">用时</div>
                </div>
            </div>
            <div style="display:flex;gap:12px;justify-content:center;">
                <button class="action-btn primary" onclick="startMockExam()">再考一次</button>
                <button class="action-btn secondary" onclick="showWelcome()">返回首页</button>
            </div>
        </div>
    `;

    // Insert result at top
    const content = document.getElementById('content-area');
    const resultDiv = document.createElement('div');
    resultDiv.innerHTML = resultHtml;
    content.insertBefore(resultDiv, content.firstChild);
    content.scrollTop = 0;

    updateStatsBar();
}

// ==================== STATISTICS ====================
function showStats() {
    closeSidebar();
    clearExamState();
    currentView = 'stats';
    currentChapter = null;
    setActiveNav(null);
    updateModeToggleState();
    setTopbar('学习统计', '各单元答题情况');

    const s = getStatsSummary();
    const content = document.getElementById('content-area');

    let html = `
        <div class="stats-grid">
            <div class="stats-card">
                <h4>总答题数</h4>
                <div class="sc-value">${s.total}</div>
                <div class="sc-sub">共 ${allQuestions.length} 题</div>
            </div>
            <div class="stats-card">
                <h4>正确数</h4>
                <div class="sc-value" style="color:var(--success)">${s.correct}</div>
                <div class="sc-sub">错误 ${s.total - s.correct} 题</div>
            </div>
            <div class="stats-card">
                <h4>总正确率</h4>
                <div class="sc-value" style="color:${s.rate >= 80 ? 'var(--success)' : s.rate >= 60 ? 'var(--primary)' : 'var(--error)'}">${s.rate}%</div>
                <div class="sc-sub">${s.rate >= 80 ? '表现优秀' : s.rate >= 60 ? '继续加油' : '需要练习'}</div>
            </div>
        </div>

        <div class="unit-stats-table">
            <h3>各单元正确率</h3>
    `;

    Object.keys(BANK).forEach(unit => {
        const us = getUnitStats(unit);
        const barColor = us.rate >= 80 ? 'var(--success)' : us.rate >= 60 ? 'var(--primary)' : us.answered > 0 ? 'var(--error)' : '#CBD5E1';
        html += `
            <div class="ust-row">
                <span class="ust-name">${unit}</span>
                <span style="font-size:0.78rem;color:var(--text-secondary);width:80px;text-align:center;">${us.answered}/${us.total}</span>
                <div class="ust-bar"><div class="ust-bar-fill" style="width:${us.answered > 0 ? us.rate : 0}%;background:${barColor}"></div></div>
                <span class="ust-pct" style="color:${barColor}">${us.answered > 0 ? us.rate + '%' : '-'}</span>
            </div>
        `;
    });

    html += `</div>`;

    // Section type breakdown
    const typeStats = { A: { total: 0, correct: 0, answered: 0 }, B: { total: 0, correct: 0, answered: 0 }, C: { total: 0, correct: 0, answered: 0 }, F: { total: 0, correct: 0, answered: 0 } };
    allQuestions.forEach(q => {
        const t = getSectionType(q.section);
        if (!typeStats[t]) typeStats[t] = { total: 0, correct: 0, answered: 0 };
        typeStats[t].total++;
        if (stats.answered[q.id] !== undefined) {
            typeStats[t].answered++;
            if (stats.answered[q.id].correct) typeStats[t].correct++;
        }
    });

    html += `
        <div class="unit-stats-table" style="margin-top:20px;">
            <h3>题型正确率</h3>
            <div class="ust-row">
                <span class="ust-name">Section A · 短对话</span>
                <span style="font-size:0.78rem;color:var(--text-secondary);width:80px;text-align:center;">${typeStats.A.answered}/${typeStats.A.total}</span>
                <div class="ust-bar"><div class="ust-bar-fill" style="width:${typeStats.A.answered > 0 ? Math.round(typeStats.A.correct/typeStats.A.answered*100) : 0}%;background:var(--primary)"></div></div>
                <span class="ust-pct" style="color:var(--primary)">${typeStats.A.answered > 0 ? Math.round(typeStats.A.correct/typeStats.A.answered*100) + '%' : '-'}</span>
            </div>
            <div class="ust-row">
                <span class="ust-name">Section B · 篇章听力</span>
                <span style="font-size:0.78rem;color:var(--text-secondary);width:80px;text-align:center;">${typeStats.B.answered}/${typeStats.B.total}</span>
                <div class="ust-bar"><div class="ust-bar-fill" style="width:${typeStats.B.answered > 0 ? Math.round(typeStats.B.correct/typeStats.B.answered*100) : 0}%;background:var(--success)"></div></div>
                <span class="ust-pct" style="color:var(--success)">${typeStats.B.answered > 0 ? Math.round(typeStats.B.correct/typeStats.B.answered*100) + '%' : '-'}</span>
            </div>
            <div class="ust-row">
                <span class="ust-name">Follow Up · 综合理解</span>
                <span style="font-size:0.78rem;color:var(--text-secondary);width:80px;text-align:center;">${typeStats.F.answered}/${typeStats.F.total}</span>
                <div class="ust-bar"><div class="ust-bar-fill" style="width:${typeStats.F.answered > 0 ? Math.round(typeStats.F.correct/typeStats.F.answered*100) : 0}%;background:var(--warning)"></div></div>
                <span class="ust-pct" style="color:#B45309">${typeStats.F.answered > 0 ? Math.round(typeStats.F.correct/typeStats.F.answered*100) + '%' : '-'}</span>
            </div>
            <div class="ust-row">
                <span class="ust-name">Section C · 填空</span>
                <span style="font-size:0.78rem;color:var(--text-secondary);width:80px;text-align:center;">6 篇</span>
                <div class="ust-bar"><div class="ust-bar-fill" style="width:0%;background:#8B5CF6"></div></div>
                <span class="ust-pct" style="color:#8B5CF6">阅读理解</span>
            </div>
        </div>
    `;

    content.innerHTML = html;
}

// ==================== INIT ====================
window.onload = () => {
    initSidebar();
    updateStatsBar();
    // Sync shuffle toggle with saved preference
    const toggle = document.getElementById('shuffle-toggle-input');
    if (toggle) toggle.checked = shuffleOptions;
    showWelcome();
};
</script>
